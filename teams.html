<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teams – Cognizant Project Health</title>
  <link href="vendor/bootstrap.min.css" rel="stylesheet">
   <link rel="stylesheet" href="cognizant-framework.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="cog-nav">
    <a class="cog-brand" href="dashboard.html">
      Cognizant ProjectTracker
      <span class="alpha-pill">Alpha</span>
    </a>
    <button class="mobile-nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false" onclick="toggleMobileNav(this)">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links d-none d-sm-flex">
      <a href="dashboard.html" class="nav-lnk">Dashboard</a>
      <a href="projects.html" class="nav-lnk">Projects</a>
      <a href="teams.html"    class="nav-lnk active">Teams</a>
      <a href="people.html"  class="nav-lnk">People</a>
      <a href="settings.html" class="nav-lnk">Settings</a>
      <a href="index.html"   class="nav-ghost">View as another role</a>

    </div>
  </nav>

  <!-- Page header -->
  <div class="page-header">
    <div class="container py-4">
      <div class="d-flex align-items-start justify-content-between flex-wrap gap-3">
        <div>
          <h1 style="font-size:1.75rem;font-weight:800;margin:0 0 0.25rem;">Teams</h1>
          <p class="mb-0" style="opacity: 0.6; font-size: 0.88rem;">
            <span id="lastUpdatedLabel"></span>
          </p>
          <div class="d-flex gap-2 flex-wrap" id="statChips"></div>
        </div>
        <button class="btn-add mt-1" onclick="openAddModal()">+ Add team</button>
      </div>
    </div>
  </div>

  <!-- Toolbar + Table -->
  <div class="container mt-4 table-card" style="border-radius: 14px; padding-left: 0px !important; padding-right: 0px !important;">
  <div class="toolbar">
    <div class="d-flex gap-2 flex-wrap align-items-center">
      <input type="text" id="searchInput" placeholder="Search teams…" oninput="renderTable()">
      <select id="statusFilter" onchange="renderTable()" style="border-radius:50px;padding:0.4rem 1rem;font-size:0.85rem;border:1px solid var(--grey-light);background:var(--grey-very-light);">
        <option value="">All statuses</option>
        <option value="on-track">On Track</option>
        <option value="at-risk">At Risk</option>
        <option value="critical">Critical</option>
      </select>
    </div>
    <button class="btn-export" onclick="exportCSV()">⬇ Download report</button>
  </div>

  <!-- Table -->
  <div class="">
    <table class="tbl responsive-entity-table team-table">
      <thead>
        <tr>
          <th scope="col" tabindex="0" role="button" onclick="setSort('name')"         id="th-name">Team <span class="sort-arrow"></span></th>
          <th scope="col" tabindex="0" role="button" onclick="setSort('status')"        id="th-status" class="hide-mobile">Status <span class="sort-arrow"></span></th>
          <th scope="col" tabindex="0" role="button" onclick="setSort('delivery')"      id="th-delivery" class="hide-mobile">Delivery <span class="sort-arrow"></span></th>
          <th scope="col" tabindex="0" role="button" onclick="setSort('morale')"        id="th-morale" class="hide-mobile">Morale <span class="sort-arrow"></span></th>
          <th scope="col" tabindex="0" role="button" onclick="setSort('satisfaction')"  id="th-satisfaction" class="hide-mobile">Satisfaction <span class="sort-arrow"></span></th>
          <th scope="col" class="no-sort" id="th-members">Members</th>
          <th scope="col" class="no-sort hide-mobile" id="th-checkins">Check-ins</th>
          <th scope="col" tabindex="0" role="button" onclick="setSort('updated')"       id="th-updated">Updated <span class="sort-arrow"></span></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div id="emptyState" style="display:none;" class="empty-state">
      <svg width="44" height="44" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg>
      <p class="mb-1 fw-bold">No teams found</p>
      <p style="font-size:0.85rem;">Try adjusting your search or filter, or add a new team.</p>
      <div class="d-flex justify-content-center gap-2 mt-2">
        <button class="btn-sm-outline" onclick="clearFilters()">Clear filters</button>
        <button class="btn-primary-action" style="padding:0.25rem 1rem;font-size:0.8rem;border-radius:50px;border:none;" onclick="openAddModal()">Add team</button>
      </div>
    </div>
  </div>
</div>

  <!-- Drawer backdrop -->
  <div class="drawer-backdrop" id="drawerBackdrop" onclick="closeDrawer()"></div>

  <!-- Side drawer -->
  <div class="drawer" id="drawer" role="dialog" aria-modal="true" aria-labelledby="drawerTitle" tabindex="-1">
    <div class="drawer-header">
      <div>
        <div class="drawer-title" id="drawerTitle">—</div>
        <div id="drawerBadge"></div>
      </div>
      <button class="drawer-close" onclick="closeDrawer()" aria-label="Close">✕</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
    <div class="drawer-footer" style="justify-content: space-between;">
      <button id="drawerDeleteBtn" title="Delete" style="background:transparent; border:none; padding:4px; color:var(--grey-dark); cursor:pointer;">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
      </button>
      <button class="btn-sm-solid" id="drawerUpdateBtn">Submit update</button>
    </div>
  </div>


  <!-- Add / Edit / Check-in modals are injected by ui-modals.js -->

  <!-- Autocomplete suggestions for "Name" fields — populated from existing people -->
  <datalist id="knownPeopleList"></datalist>

  <div id="toast"></div>
  <div class="mb-5 pb-3 text-center">
    <button onclick="resetDemoData()" style="background:none;border:none;font-size:0.72rem;color:var(--grey-dark);cursor:pointer;opacity:0.55;text-decoration:underline;">Reset demo data</button>
  </div>

  <script src="vendor/bootstrap.bundle.min.js"></script>

  <script src="app-data.js"></script>
  <script src="ui-modals.js"></script>
<script>injectListPageModals({ entity:"team", entityCap:"Team", peopleLabel:"Members", personWord:"member", namePlaceholder:"e.g. Service Design Team", leadPlaceholder:"e.g. Jamie Foster" });</script>
<script src="scripts-teams.js"></script>
</body>
</html>
