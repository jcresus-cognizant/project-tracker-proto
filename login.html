<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in – Cognizant Project Health</title>
  <link href="vendor/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="cognizant-framework.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    html, body {
      height: 100%;
      min-height: 100vh;
    }

    body {
      background: linear-gradient(150deg, #000048 0%, #1a1a68 40%, #2a3090 70%, #2f78c4 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* Brand header */
    .login-brand {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .login-brand .brand-name {
      color: white;
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      margin-bottom: 0.5rem;
    }
    .login-brand .brand-tagline {
      color: rgba(255,255,255,0.55);
      font-size: 0.82rem;
    }

    /* Welcome heading */
    .login-heading {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-heading h1 {
      color: white;
      font-size: 1.9rem;
      font-family: "Gellix-SemiBold", sans-serif;
      margin-bottom: 0.4rem;
    }
    .login-heading p {
      color: rgba(255,255,255,0.55);
      font-size: 0.9rem;
      margin: 0;
    }

    /* Role cards */
    .role-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      width: 100%;
      max-width: 480px;
    }
    @media (max-width: 520px) {
      .role-grid { grid-template-columns: 1fr; max-width: 320px; }
    }

    .role-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 16px;
      padding: 1.5rem 1.25rem;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.15s ease, box-shadow 0.18s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
    }
    .role-card:hover {
      background: rgba(255,255,255,0.13);
      border-color: rgba(255,255,255,0.3);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }
    .role-card:active {
      transform: translateY(0);
    }

    /* Icon circle */
    .role-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      margin-bottom: 0.2rem;
    }
    .role-icon.manager {
      background: rgba(47, 120, 196, 0.25);
      border: 1px solid rgba(47, 120, 196, 0.4);
    }
    .role-icon.member {
      background: rgba(6, 199, 204, 0.2);
      border: 1px solid rgba(6, 199, 204, 0.35);
    }

    .role-title {
      color: white;
      font-family: "Gellix-SemiBold", sans-serif;
      font-size: 1rem;
      line-height: 1.2;
    }
    .role-desc {
      color: rgba(255,255,255,0.5);
      font-size: 0.78rem;
      line-height: 1.45;
      margin: 0;
    }

    .role-cta {
      margin-top: 0.5rem;
      padding: 0.4rem 1.1rem;
      border-radius: 50px;
      font-size: 0.78rem;
      font-family: "Gellix-SemiBold", sans-serif;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .role-card.manager-card .role-cta {
      background: #2f78c4;
      color: white;
    }
    .role-card.member-card .role-cta {
      background: #06C7CC;
      color: #000048;
    }
    .role-card:hover .role-cta { opacity: 0.88; }

    /* Divider between cards */
    .role-divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: rgba(255,255,255,0.25);
      font-size: 0.75rem;
      margin: 0;
    }
    .role-divider::before,
    .role-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.12);
    }

    /* Top-right user bar */
    .user-bar {
      position: fixed;
      top: 1rem;
      right: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .user-name {
      color: rgba(255,255,255,0.7);
      font-size: 0.82rem;
    }
    .signout-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50px;
      color: rgba(255,255,255,0.7);
      font-size: 0.78rem;
      padding: 4px 12px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .signout-btn:hover {
      background: rgba(255,255,255,0.18);
      color: white;
    }
  </style>
</head>
<body>

  <!-- Top-right user bar -->
  <div class="user-bar">
    <span class="user-name" id="userNameLabel">Alex Morgan</span>
    <button class="signout-btn" onclick="location.href='login.html'">Sign out</button>
  </div>

  <!-- Brand -->
  <div class="login-brand">
    <div class="brand-name">
      Cognizant ProjectTracker
      <span class="alpha-pill">Alpha</span>
    </div>
  </div>

  <!-- Heading -->
  <div class="login-heading">
    <h1>Welcome back</h1>
    <p>Choose how you're signing in today</p>
  </div>

  <!-- Role cards -->
  <div class="role-grid">

    <a href="dashboard.html" class="role-card manager-card" onclick="localStorage.setItem('cpt_role','lead')">
      <div class="role-icon manager">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2f78c4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </div>
      <div class="role-title">Project Lead</div>
      <p class="role-desc">I manage project health across my portfolio</p>
      <span class="role-cta">Go to dashboard →</span>
    </a>

    <a href="member.html" class="role-card member-card" onclick="localStorage.setItem('cpt_role','member')">
      <div class="role-icon member">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#06C7CC" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </div>
      <div class="role-title" style="white-space:nowrap;">Team Member</div>
      <p class="role-desc">I'm checking in on how my work is going</p>
      <span class="role-cta">Go to my view →</span>
    </a>

  </div>


</body>
</html>
