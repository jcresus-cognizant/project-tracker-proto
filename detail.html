<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail – Cognizant Project Tracker</title>
  <link href="vendor/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="cognizant-framework.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Navbar -->
 <nav class="cog-nav">
    <a class="cog-brand" href="dashboard.html">
      Cognizant ProjectTracker
      <span class="alpha-pill">Alpha</span>
    </a>
    <button class="mobile-nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false" onclick="toggleMobileNav(this)">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links d-none d-sm-flex">
      <a href="dashboard.html" class="nav-lnk">Dashboard</a>
      <a href="projects.html" class="nav-lnk">Projects</a>
      <a href="teams.html"   class="nav-lnk">Teams</a>
      <a href="people.html"  class="nav-lnk">People</a>
      <a href="settings.html" class="nav-lnk">Settings</a>
      <a href="index.html"   class="nav-ghost">View as another role</a>
    </div>
  </nav>

  <!-- Page header (with summary strip) -->
  <div class="page-header dashboard-header">
    <div class="container dashboard-header-inner">
      <div class="dash-hero">
        <div style="color: white;min-width:0;">
          <a href="javascript:history.back()" style="color:rgba(255,255,255,0.7);text-decoration:none;font-size:0.8rem;margin-bottom:8px;display:inline-block;">← Back</a>
          <h1 class="mb-1" id="detailTitle">—</h1>
          <p class="mb-0 dashboard-updated" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;" id="detailSubtitle">
            —
          </p>
        </div>
        <div class="hero-actions">
          <div class="hero-secondary" style="display:flex;gap:8px;align-items:center;">
            <button id="detailDeleteBtn" title="Delete" style="background:transparent; border:none; padding:4px; color:rgba(255,255,255,0.6); cursor:pointer;">
              <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>
            <button class="btn-hdr-ghost" id="detailEditBtn">Edit</button>
            <button class="btn-add" id="detailUpdateBtn" style="padding: 0.45rem 1rem;">＋ Submit health update</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="container mt-4 mb-5" id="detailContent">
    <div class="row g-4">
      
      <!-- Left Column: Metrics & Charts -->
      <div class="col-lg-8">
        
        <!-- RAG Cards -->
        <div class="row g-2 mb-4" id="detailRagCards"></div>

        <!-- Trend Chart -->
        <div class="card p-4 mb-4" style="border-radius:12px;">
          <h5 style="font-size:0.9rem;font-weight:700;color:var(--primary);margin-bottom:1rem;">Trend Over Time (Last 6 Weeks)</h5>
          <div id="detailTrendChart"></div>
        </div>

        <!-- Milestones (Projects Only) -->
        <div id="detailMilestonesContainer"></div>
        
      </div>

      <!-- Right Column: People, Check-ins, Notes -->
      <div class="col-lg-4">
        
        <!-- Notes -->
        <div id="detailNotesContainer"></div>

        <!-- People List -->
        <div class="card p-3 mb-4" style="border-radius:12px;">
          <h5 style="font-size:0.9rem;font-weight:700;color:var(--primary);margin-bottom:1rem;" id="detailPeopleTitle">Team</h5>
          <div id="detailPeopleList"></div>
        </div>

        <!-- Check-ins Feed -->
        <div class="card p-3 mb-4" style="border-radius:12px;">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 style="font-size:0.9rem;font-weight:700;color:var(--primary);margin-bottom:0;" id="detailCheckinsTitle">Check-ins</h5>
            <button class="btn-sm-outline" style="padding:0.2rem 0.6rem;font-size:0.75rem;" id="detailAddCheckinBtn">+ Add</button>
          </div>
          <div id="detailVoteDistribution" class="mb-3"></div>
          <div id="detailCheckinsFeed"></div>
        </div>

      </div>

    </div>
  </div>

  <!-- Edit Details Modal -->
  <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true" aria-label="Edit details">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header" style="background-color: var(--primary); color: white; border-radius: 12px 12px 0 0;">
          <h5 class="modal-title" id="editModalTitle">Edit</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body p-4">
          <input type="hidden" id="editId">
          <div class="row g-3 mb-3">
            <div class="col-md-8">
              <label class="form-label fw-bold">Name</label>
              <input type="text" id="editName">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold">Lead</label>
              <input type="text" id="editLead">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Notes</label>
            <textarea id="editNotes" rows="2"></textarea>
          </div>
          <div class="mb-2">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <label class="form-label fw-bold mb-0">People</label>
              <button type="button" class="btn btn-outline-dark" style="font-size:0.74rem;padding:3px 12px;border-radius:50px;" onclick="addEditPersonRow()">+ Add person</button>
            </div>
            <div id="editPeopleList" class="d-flex flex-column gap-2"></div>
          </div>
          <div id="editError" class="text-danger mt-2" style="font-size:0.82rem;display:none;"></div>
        </div>
        <div class="modal-footer" style="border-top:1px solid var(--grey-light);">
          <button type="button" class="btn-cancel" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn-primary-action" onclick="submitEdit()">Save changes</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Check-in Modal -->
  <div class="modal fade" id="checkinModal" tabindex="-1" aria-hidden="true" aria-label="Submit health update">
    <div class="modal-dialog modal-dialog-centered checkin-modal-dialog">
      <div class="modal-content">
        <div class="modal-header" style="background: linear-gradient(90deg, #2E308E, #2f78c4); color: white; border-radius: 12px 12px 0 0;">
          <div>
            <h5 class="modal-title mb-0">How's it going?</h5>
            <small style="opacity:0.7;">Rate how each area is going right now</small>
          </div>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body p-4">
          <div class="row g-3 mb-4">
            <div class="col-md-6">
              <label class="form-label fw-bold" style="font-size:0.82rem;">Submitting as</label>
              <div id="checkinSelfDisplay" style="font-size:0.88rem;font-weight:600;color:var(--primary);padding:0.45rem 0.75rem;background:#f0f1f8;border-radius:8px;margin-bottom:0.5rem;">Alex Morgan</div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="checkinOnBehalf" onchange="toggleBehalfDropdown()">
                <label class="form-check-label" for="checkinOnBehalf" style="font-size:0.78rem;color:var(--grey-dark);">On behalf of someone else</label>
              </div>
              <select id="checkinBehalfOf" style="display:none;margin-top:0.5rem;border-radius:8px!important;"></select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">Project or team</label>
              <select id="checkinItem" onchange="updateBehalfDropdown()"></select>
            </div>
          </div>

          <p class="fw-bold mb-3" style="color:var(--primary);">How's each area feeling right now?</p>

          <div class="d-flex flex-column gap-3 mb-4" id="ciRows"></div>

          <div class="mb-2">
            <label class="form-label fw-bold">Anything else? <span style="font-weight:400;color:var(--grey-dark);">(optional)</span></label>
            <textarea id="checkinNote" rows="2" placeholder="What's changed since your last check-in? Blockers, wins, or context…"></textarea>
          </div>
          <div id="checkinError" class="text-danger" style="font-size:0.82rem;display:none;"></div>
        </div>
        <div class="modal-footer" style="border-top: 1px solid var(--grey-light);">
          <button type="button" class="btn-cancel" data-bs-dismiss="modal">Cancel</button>
          <button type="button" id="checkinSubmitBtn" class="btn-primary-action" onclick="submitCheckin()" disabled>Submit health update</button>
        </div>
      </div>
    </div>
  </div>

  <datalist id="knownPeopleList"></datalist>
  <div id="toast"></div>

  <script src="vendor/bootstrap.bundle.min.js"></script>
  <script src="app-data.js"></script>
  <script src="scripts-detail.js"></script>
</body>
</html>
